# typos configuration — code-aware spell checking
# https://github.com/crate-ci/typos

[default]
# Skip identifiers that look like hex blobs or base64; these surface in
# crypto/identifier fixtures and test vectors as legitimate non-words.
extend-ignore-identifiers-re = ["^[A-Fa-f0-9]{6,}$", "^[A-Za-z0-9+/]{32,}={0,2}$"]

[default.extend-words]
# Discworld lore — eighth color of the spectrum, project namesake
octarine = "octarine"

# Security and identifier domain acronyms that resemble typos
ssrf = "ssrf"
xxe = "xxe"
xss = "xss"
pii = "pii"

# Medical identifier account types (primitives/identifiers/medical)
hsa = "hsa"
hra = "hra"
fsa = "fsa"

# Electronic Health Record — surfaces in docs and identifier descriptions
EHR = "EHR"
ehr = "ehr"

# US tax identifier — Employer ID Number (primitives/identifiers/government)
ein = "ein"
Ein = "Ein"
EIN = "EIN"

# Nigeria National ID Number (primitives/identifiers/government/nigeria)
nin = "nin"
Nin = "Nin"
NIN = "NIN"

# Australian Company Number (primitives/identifiers/government/australia)
acn = "acn"
Acn = "Acn"
ACN = "ACN"

# Singapore Unique Entity Number (primitives/identifiers/government/singapore)
uen = "uen"
Uen = "Uen"
UEN = "UEN"

# MongoDB query operator $nin — NoSQL injection detection patterns
# (covered by lowercase `nin` above)

# HashiCorp Vault prefix — secrets-manager API key detection
Hashi = "Hashi"

# Spanish identifier vocabulary used in regional detection / passphrase regex
# (frase = phrase, secretas = secret/secrets, Identificacion = identification)
frase = "frase"
secretas = "secretas"
Identificacion = "Identificacion"

# German passphrase vocabulary — "geheime worte" = "secret words"
worte = "worte"

# Polish PESEL — "numer PESEL" = "PESEL number"
numer = "numer"

# US state abbreviation North Dakota (location/conversion/address)
ND = "ND"

# observe metric name — observe.threshold.criticals
criticals = "criticals"
CRITICALS = "CRITICALS"

# Test fixtures: strings chosen specifically because they are NOT words
# `abd` — single-char-diff from "abc" in constant-time-compare and
#         Levenshtein-distance tests across auth/{csrf,remember,reset,password}
# `caf` — ASCII-only stripped form of "café" used as the expected output
#         in unicode-decomposition / non-ASCII removal tests
# `nam` — embedded substring inside test Google API key fixtures
abd = "abd"
caf = "caf"
nam = "nam"

# Doc comment in primitives/http/request_id.rs — both spellings are accepted;
# project chooses `unparseable` for consistency with the surrounding text
unparseable = "unparseable"

# Geographic proper nouns from the location gazetteer (~280 countries +
# ~1500 cities). These city/region names collide with typos' English
# corpus suggestions. Each entry is a verified place name.
Linz = "Linz"   # Austria
sur = "sur"     # "sur" appears in Esch-sur-Alzette (Luxembourg)
Sur = "Sur"     # Oman city
Tema = "Tema"   # Ghana city
Herat = "Herat" # Afghanistan city
Ba = "Ba"       # Fiji city

# ISO 3166-1 alpha-2 country codes that collide with English typos. The IBAN
# recognizer enumerates all 70 supported country codes (#436), and the gazetteer
# uses these as well.
FO = "FO" # Faroe Islands
fo = "fo" # lowercase variant

# Indian motor-vehicle registration vocabulary — RTO = Regional Transport Office.
# Surfaces in IN_VEHICLE_REGISTRATION recognizer context keywords (#476, #450)
# and per-state RTO format docs.
RTO = "RTO"
rto = "rto"

# Azure Kubernetes Service — surfaces in deployment docs, Bicep modules, Helm
# chart values, and the Invisio-style reference deployment (#475, #594).
AKS = "AKS"
aks = "aks"

# DICOM PN (Person Name) Value Representation type. Surfaces throughout the
# octarine-dicom crate (#471, #555) and PS3.15 Annex E conformance work.
# Single-letter VR codes (AE, AS, AT, CS, DA, DS, DT, FD, FL, IS, LO, LT, OB,
# OD, OF, OL, OW, PN, SH, SL, SQ, SS, ST, TM, UI, UL, UN, US, UT) are the
# DICOM type system — add only the ones typos flags as misspellings.
PN = "PN"
pn = "pn"

# Pydantic-style configuration vocabulary used in TOML schema discussions
# (#496 layered config) — `entit{y,ies}` is a parametric ref to entity/entities
# in the recognizer config schema.
entit = "entit"

# Stock exchange codes that surface in organization-name corpora and any
# future financial-identifier exchange-listing detection.
BSE = "BSE" # Bombay Stock Exchange
TYO = "TYO" # Tokyo Stock Exchange

# Presidio sample-code typos preserved verbatim as quotes in
# docs/audits/presidio/. These are NOT octarine typos — they're errors in
# Microsoft's published sample code that we cite by-string. Mapping to
# themselves silences typos without normalizing the citation.
mappgings = "mappgings" # Invisio sample `build_entity_mappgings` (sic)
namne = "namne"         # Spark sample `table_namne` (sic)
parrallel = "parrallel" # Spark sample comment "parrallel processing" (sic)

[files]
extend-exclude = [
  "CHANGELOG.md",
  "Cargo.lock",
  "target/**",
  "node_modules/**",
  ".git/**",
  "containers/**",
  "**/*.lock",
  "tests/results/**",
  "**/proptest-regressions/**",
  "**/fixtures/**",
  # Gazetteer of ~280 countries + ~1500 cities — geographic proper nouns
  # routinely collide with typos-corpus suggestions (e.g. "Herat" → "Heart",
  # "Tema" → "Team"). Each entry is a verified place name; not subject to
  # spell-checking.
  "**/identifiers/common/patterns/location/gazetteer.rs",
]
