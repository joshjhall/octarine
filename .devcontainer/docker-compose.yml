services:
  devcontainer:
    build:
      context: ../containers
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: mcr.microsoft.com/devcontainers/base:trixie
        PROJECT_NAME: octarine
        USERNAME: vscode
        WORKING_DIR: /workspace/octarine
        # Enable passwordless sudo for development (allows entrypoint to fix Docker socket)
        ENABLE_PASSWORDLESS_SUDO: "true"
        # Dev tools
        INCLUDE_OP: "true"
        INCLUDE_DEV_TOOLS: "true"
        INCLUDE_DOCKER: "true"
        # Main languages for development
        INCLUDE_RUST_DEV: "true"
        # Supporting languages for linting and other tools
        INCLUDE_PYTHON: "true"
        INCLUDE_NODE: "true"
        # Supporting tools
        INCLUDE_POSTGRES_CLIENT: "true"
        INCLUDE_REDIS_CLIENT: "true"
      cache_from:
        - type=local,src=/tmp/.buildx-cache
      cache_to:
        - type=local,dest=/tmp/.buildx-cache,mode=max
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ..:/workspace/octarine
      # Shared Rust caches (reduces duplication after image rebuild)
      - cargo-registry:/cache/cargo/registry
      - cargo-git:/cache/cargo/git
      - rustup:/cache/rustup
    tmpfs:
      # Writable /run so supervisor can create its socket/pidfile as the runtime user (UID 1000)
      - /run:mode=0755,uid=1000,gid=1000
      # 1Password cache is kept in memory
      - /cache/1password/secrets:size=8m,mode=0700,uid=1000,gid=1000
    env_file:
      - ../.env
    environment:
      - CLAUDE_MCPS=filesystem
      - MEMORY_FILE_PATH=/workspace/octarine/.claude/memory
    # Use tini as init system for proper zombie process reaping
    # This is a belt-and-suspenders approach - the Dockerfile also includes tini,
    # but init: true ensures proper PID 1 behavior even if command overrides entrypoint
    init: true
    # Required for bindfs FUSE overlay (fixes macOS VirtioFS permission issues)
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    # Entrypoint handles Docker socket permissions via sudo (no root needed)
    # devcontainer.json sets overrideCommand: false so our ENTRYPOINT runs
    command: ["sleep", "infinity"]
    # Health check configuration (inherits from Dockerfile)
    # Override if needed: healthcheck: {test: ["CMD", "healthcheck", "--verbose"]}
    networks:
      - octarine-network

# Shared cache volumes
volumes:
  cargo-registry:
  cargo-git:
  rustup:

networks:
  octarine-network:
    driver: bridge
