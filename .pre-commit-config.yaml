# Pre-commit configuration for octarine
# Install: pipx install pre-commit && pre-commit install
# Run all: pre-commit run --all-files
# Update: pre-commit autoupdate

repos:
  # ==========================================================================
  # General file checks
  # ==========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
        exclude: ^\.devcontainer/devcontainer\.json$
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
        exclude: ^crates/octarine/src/primitives/identifiers/

  # ==========================================================================
  # Security scanning
  # ==========================================================================
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ==========================================================================
  # Rust formatting (pre-commit)
  # ==========================================================================
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --
        language: system
        types: [rust]
        pass_filenames: false

  # ==========================================================================
  # JSON linting with Biome
  # ==========================================================================
  - repo: local
    hooks:
      - id: biome-json
        name: biome (JSON)
        entry: biome check --write
        language: system
        types: [json]
        exclude: ^\.devcontainer/

  # ==========================================================================
  # Custom guards
  # ==========================================================================
  - repo: local
    hooks:
      - id: no-env-file
        name: Prevent .env commit
        entry: >-
          bash -c '
          git diff --cached --name-only |
          grep -qE "^\\.env(\\.secrets)?$" &&
          echo "ERROR: .env file staged for commit" &&
          exit 1 || exit 0'
        language: system
        pass_filenames: false
        always_run: true

  # ==========================================================================
  # Pre-push hooks
  # ==========================================================================
  - repo: local
    hooks:
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets --all-features -- -D warnings
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: cargo-test
        name: cargo test
        entry: cargo test --workspace
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
