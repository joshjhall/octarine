name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
  schedule:
    # Daily dependency-health sweep against main: surfaces new RustSec
    # advisories within 24h even when no PRs are open. Off-mark minute to
    # avoid the :00 stampede on the GitHub Actions runners.
    - cron: '17 6 * * *'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@just
      - run: just clippy

  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@just
      - run: just test

  doc:
    name: Doc
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: taiki-e/install-action@cargo-audit
      - uses: taiki-e/install-action@just
      - run: just deps-audit

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: taiki-e/install-action@cargo-deny
      - uses: taiki-e/install-action@just
      - run: just deps-deny

  osv:
    name: OSV Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@osv-scanner
      - uses: taiki-e/install-action@just
      - run: just deps-osv

  semver:
    name: SemVer
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: semver
      - uses: taiki-e/install-action@cargo-semver-checks
      - uses: taiki-e/install-action@just
      - run: just semver-check

  arch:
    name: Architecture
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip
      - run: pip install pytest
      - uses: taiki-e/install-action@just
      - run: just arch-check
      - run: just arch-check-test

  check-windows:
    name: Check (Windows)
    runs-on: windows-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows
      - run: cargo check --workspace --all-features

  check-macos:
    name: Check (macOS)
    runs-on: macos-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Reset pre-installed Rust toolchain
        # macOS runner images sometimes ship a stub cargo that is actually
        # rustup-init; the dtolnay/rust-toolchain action then short-circuits
        # past its curl install (rustup-init reports "rustup is present") and
        # never registers $CARGO_HOME/bin on PATH. cargo check then resolves
        # to rustup-init and fails with "unexpected argument 'check' found".
        # Wiping forces dtolnay's clean-install path.
        run: rm -rf "$HOME/.cargo" "$HOME/.rustup"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - name: Verify cargo resolves to toolchain
        # Fail fast (and visibly) if the rustup-init flake recurs, instead of
        # letting cargo check emit a confusing usage error 30 lines later.
        run: |
          which cargo
          cargo --version
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos
      - run: cargo check --workspace --all-features

  test-nightly:
    name: Test (nightly)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nightly
      - uses: taiki-e/install-action@just
      - run: just test
