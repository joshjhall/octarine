name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE*"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE*"
  schedule:
    # Daily dependency-health sweep against main: surfaces new RustSec
    # advisories within 24h even when no PRs are open. Off-mark minute to
    # avoid the :00 stampede on the GitHub Actions runners.
    - cron: "17 6 * * *"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
          components: rustfmt
      - run: cargo fmt --all -- --check

  dprint:
    name: Dprint
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@dprint
      - uses: taiki-e/install-action@just
      - run: just fmt-data-check

  typos:
    name: Typos
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: typos-cli@1.45.1
      - uses: taiki-e/install-action@just
      - run: just spell

  commit-lint:
    name: Commit Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          # conform --base-branch needs full history to diff against
          # origin/main. Default fetch-depth: 1 would fail.
          fetch-depth: 0
      - name: Install conform
        # No taiki-e/install-action recipe yet; install the naked
        # binary directly. Pinned to the version shipped by containers
        # v4.19.0 so the dev-container hook and CI run identical
        # binaries.
        run: |
          version=0.1.0-alpha.31
          url="https://github.com/siderolabs/conform/releases/download/v${version}/conform-linux-amd64"
          sudo curl -fsSL "$url" -o /usr/local/bin/conform
          sudo chmod +x /usr/local/bin/conform
          conform version
      - name: Lint branch commits
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # actions/checkout defaults to pull/*/merge for PR events, which
          # creates a synthetic "Merge <head> into <base>" commit with a
          # 92-char non-conventional header. Conform walks
          # origin/${BASE_REF}..HEAD and flags that commit as invalid,
          # blocking every PR. Detach HEAD onto the PR head first so
          # conform sees only the real PR commits.
          git checkout --detach "$HEAD_SHA"
          conform enforce --base-branch "origin/$BASE_REF"
      - name: Lint PR title
        # Squash-merge uses the PR title as the merge subject, so it
        # must also pass. Write to a tmp file and pass through
        # --commit-msg-file (the only flag that accepts arbitrary text).
        env:
          # Read via env to avoid shell injection via malicious PR
          # titles (actionlint-recommended pattern).
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          tmp=$(mktemp)
          printf '%s\n' "$PR_TITLE" > "$tmp"
          conform enforce --commit-msg-file "$tmp"

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@just
      - run: just clippy

  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@just
      - run: just test

  doc:
    name: Doc
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: taiki-e/install-action@cargo-audit
      - uses: taiki-e/install-action@just
      - run: just deps-audit

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: taiki-e/install-action@cargo-deny
      - uses: taiki-e/install-action@just
      - run: just deps-deny

  osv:
    name: OSV Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@osv-scanner
      - uses: taiki-e/install-action@just
      - run: just deps-osv

  semver:
    name: SemVer
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: semver
      - uses: taiki-e/install-action@cargo-semver-checks
      - uses: taiki-e/install-action@just
      - run: just semver-check

  arch:
    name: Architecture
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip
      - run: pip install pytest
      - uses: taiki-e/install-action@just
      - run: just arch-check
      - run: just arch-check-test

  check-windows:
    name: Check (Windows)
    runs-on: windows-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows
      - run: cargo check --workspace --all-features

  check-macos:
    name: Check (macOS)
    runs-on: macos-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Ensure $CARGO_HOME/bin on PATH
        # macOS runner images come with rustup pre-installed at a system path
        # (e.g. /opt/homebrew/bin/rustup). dtolnay/rust-toolchain's
        # "install rustup if needed" guard sees rustup is present and
        # short-circuits past "echo $CARGO_HOME/bin >> $GITHUB_PATH". The
        # toolchain installs fine, but the shim dir never lands on PATH,
        # which breaks cargo invocations after the cache step swaps in its
        # own .cargo/bin contents.
        run: echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> "$GITHUB_PATH"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - name: Verify cargo resolves to toolchain
        # Fail fast (and visibly) if cargo/rustc still aren't reachable,
        # instead of letting later steps emit a confusing error.
        run: |
          which cargo
          which rustc
          cargo --version
          rustc --version
      - uses: Swatinem/rust-cache@v2
        with:
          # `macos-v2` invalidates a cache poisoned by the original
          # rustup-init flake (an earlier run cached a stub `cargo` that
          # was actually rustup-init; every subsequent run restored it
          # and then `cargo check` resolved to rustup-init).
          shared-key: macos-v2
          # Do not cache ~/.cargo/bin on this job — we don't `cargo
          # install` anything here, and caching the toolchain shims has
          # only caused breakage on macOS. The toolchain itself lives in
          # ~/.rustup/toolchains and is reinstalled by dtolnay each run.
          cache-bin: false
      - run: cargo check --workspace --all-features

  test-nightly:
    name: Test (nightly)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nightly
      - uses: taiki-e/install-action@just
      - run: just test
